<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>闖關棋盤</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
}

.cell {
  width: 80px;
  height: 80px;
  border: 2px solid black;
  cursor: pointer;
}

.red { background: red; }
.blue { background: blue; }
.green { background: green; }
.yellow { background: goldenrod; }

.selector button {
  margin: 5px;
}

</style>
</head>

<body>

<h2>🎮 闖關棋盤（4人同步）</h2>

<!-- 選玩家 -->
<div class="selector">
  <button onclick="setPlayer('red')">紅</button>
  <button onclick="setPlayer('blue')">藍</button>
  <button onclick="setPlayer('green')">綠</button>
  <button onclick="setPlayer('yellow')">黃</button>
</div>

<h3 id="current">目前玩家：未選擇</h3>

<!-- 🔄 Reset 按鈕 -->
<button onclick="resetBoard()">🔄 重置全部</button>

<br><br>

<div class="grid" id="grid"></div>

<script>

// Firebase 設定（已填好）
const firebaseConfig = {
  apiKey: "你的KEY",
  authDomain: "easy-1192d.firebaseapp.com",
  databaseURL: "https://easy-1192d-default-rtdb.firebaseio.com/",
  projectId: "easy-1192d",
  appId: "1:638651289325:web:363b55878a92f7748b46e4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPlayer = null;

// 選玩家
function setPlayer(color) {
  currentPlayer = color;
  document.getElementById("current").innerText = "目前玩家：" + color;
}

// 建立40格
function createGrid() {
  const grid = document.getElementById("grid");

  for (let i = 0; i < 40; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.id = "cell_" + i;

    cell.onclick = () => clickCell(i);

    grid.appendChild(cell);
  }
}

// 點擊格子
function clickCell(i) {
  if (!currentPlayer) {
    alert("先選玩家！");
    return;
  }

  db.ref("grid/" + i).set(currentPlayer);
}

// 🔄 重置功能
function resetBoard() {
  if (!confirm("確定要重置全部嗎？")) return;

  for (let i = 0; i < 40; i++) {
    db.ref("grid/" + i).remove();
  }
}

// 即時同步
db.ref("grid").on("value", snap => {
  const data = snap.val() || {};

  for (let i = 0; i < 40; i++) {
    const cell = document.getElementById("cell_" + i);

    cell.className = "cell";

    if (data[i]) {
      cell.classList.add(data[i]);
    }
  }
});

createGrid();

</script>

</body>
</html>
