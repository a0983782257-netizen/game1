<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>闖關棋盤</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
}

/* 棋盤 */
#board {
  display: flex;
  flex-direction: column; /* 1在最下面 */
  align-items: center;
}

/* 每一列 */
.row {
  display: flex;
  align-items: center;
  margin: 8px 0;
}

/* 關卡數字 */
.level {
  width: 60px;
  text-align: right;
  padding-right: 10px;
  font-weight: bold;
  font-size: 18px;
}

/* 4格 */
.cells {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
}

/* 格子 */
.cell {
  width: 80px;
  height: 80px;
  border: 2px solid black;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: bold;
  color: white;
  text-shadow: 0 0 3px black;
}

/* 顏色 */
.red { background: red; }
.blue { background: blue; }
.green { background: green; }
.yellow { background: goldenrod; }

button {
  margin: 5px;
  padding: 6px 10px;
}
</style>
</head>

<body>

<h2>🎮 闖關棋盤（4人同步）</h2>

<!-- 玩家 -->
<button onclick="setPlayer('red')">紅 (R)</button>
<button onclick="setPlayer('blue')">藍 (B)</button>
<button onclick="setPlayer('green')">綠 (G)</button>
<button onclick="setPlayer('yellow')">黃 (Y)</button>

<h3 id="current">目前玩家：未選擇</h3>

<!-- Reset -->
<button onclick="resetBoard()">🔄 重置全部</button>

<br><br>

<div id="board"></div>

<script>

// 🔴 Firebase 設定（請確認）
const firebaseConfig = {
  apiKey: "你的KEY",
  authDomain: "easy-1192d.firebaseapp.com",
  databaseURL: "https://easy-1192d-default-rtdb.firebaseio.com/",
  projectId: "easy-1192d",
  appId: "1:638651289325:web:363b55878a92f7748b46e4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPlayer = null;

// 👤 選玩家
function setPlayer(color) {
  currentPlayer = color;
  document.getElementById("current").innerText = "目前玩家：" + color;
}

// 🧱 建立棋盤
function createBoard() {
  const board = document.getElementById("board");

  for (let level = 10; level >= 1; level--) {

    const row = document.createElement("div");
    row.className = "row";

    // 左邊關卡
    const levelDiv = document.createElement("div");
    levelDiv.className = "level";
    levelDiv.innerText = level;

    // 右邊格子
    const cells = document.createElement("div");
    cells.className = "cells";

    for (let i = 0; i < 4; i++) {
      const index = (level - 1) * 4 + i;

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.id = "cell_" + index;

      cell.onclick = () => clickCell(index);

      cells.appendChild(cell);
    }

    row.appendChild(levelDiv);
    row.appendChild(cells);

    board.appendChild(row);
  }
}

// 點擊格子
function clickCell(i) {
  if (!currentPlayer) {
    alert("請先選玩家");
    return;
  }

  db.ref("grid/" + i).set(currentPlayer);
}

// 🔄 Reset
function resetBoard() {
  if (!confirm("確定要重置全部？")) return;

  for (let i = 0; i < 40; i++) {
    db.ref("grid/" + i).remove();
  }
}

// 🔄 即時同步
db.ref("grid").on("value", snap => {
  const data = snap.val() || {};

  for (let i = 0; i < 40; i++) {
    const cell = document.getElementById("cell_" + i);
    if (!cell) continue;

    cell.className = "cell";
    cell.innerText = "";

    if (data[i]) {
      const color = data[i];
      cell.classList.add(color);

      // 色盲文字
      if (color === "red") cell.innerText = "R";
      if (color === "blue") cell.innerText = "B";
      if (color === "green") cell.innerText = "G";
      if (color === "yellow") cell.innerText = "Y";
    }
  }
});

createBoard();

</script>

</body>
</html>
